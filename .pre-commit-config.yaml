repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: check-yaml
      - id: check-toml
      - id: check-json

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        # --external-sources: follow `source` paths; --shell=bash: default shell for files without shebang
        # zsh files use zsh-specific syntax that shellcheck does not support
        args: ['--external-sources', '--shell=bash', '--severity=warning']
        exclude: ^zsh/
