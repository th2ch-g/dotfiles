default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes

  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker
        args: ["--config", ".hadolint.yaml"]
        files: ^Dockerfile$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.31.3
    hooks:
      - id: check-github-workflows

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.8
    hooks:
      - id: actionlint

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        # --external-sources: follow `source` paths; --shell=bash: default shell for files without shebang
        # zsh files use zsh-specific syntax that shellcheck does not support
        args: ["--external-sources", "--shell=bash", "--severity=warning"]
        exclude: ^zsh/

  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.0.2
    hooks:
      - id: stylua
        args: ["--indent-type", "Spaces", "--indent-width", "4"]
        files: ^nvim/.*\.lua$

  # - repo: https://github.com/astral-sh/ruff-pre-commit
  #   rev: v0.11.13
  #   hooks:
  #     - id: ruff
  #       args: ["--fix"]
  #     - id: ruff-format

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.8.0-1
    hooks:
      - id: shfmt
        args: [-i, "4", -ci, -sr, -w]

  - repo: https://github.com/crate-ci/typos
    rev: v1.45.1
    hooks:
      - id: typos

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.37.1
    hooks:
      - id: yamllint

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.18.1
    hooks:
      - id: markdownlint-cli2
        exclude: ^claude/CLAUDE.md$

  - repo: https://github.com/checkmake/checkmake.git
    rev: 0.2.2
    hooks:
      - id: checkmake

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: node
        entry: prettier
        args: ["--write", "--ignore-unknown"]
        additional_dependencies: ["prettier@3.5.3"]
        files: \.(json|md|ya?ml)$

  - repo: local
    hooks:
      - id: bash-syntax-check
        name: bash syntax check
        language: system
        entry: bash -n
        files: ^(link\.sh|lib/.*\.sh|install_scripts/.*\.sh|.*/run\.sh)$
        types: [file]

      - id: toml-format
        name: toml format
        entry: taplo fmt
        language: system
        types: [toml]

      - id: sort-brewfile
        name: sort brewfile
        language: system
        entry: lib/check_sorted.sh brewfile
        files: ^brew/Brewfile$
        types: [file]

      - id: sort-cargo-list
        name: sort cargo list
        language: system
        entry: lib/check_sorted.sh plain
        files: ^cargo/list\.txt$
        types: [file]

      - id: sort-python-requirements
        name: sort python requirements
        language: system
        entry: lib/check_sorted.sh plain
        files: ^python3/requirements\.txt$
        types: [file]

      - id: zsh-syntax-check
        name: zsh syntax check
        language: system
        entry: zsh -n
        files: ^(zsh/|install\.sh$)
        types: [file]
