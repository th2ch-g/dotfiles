# Cargo packages. Installed via: ./install.sh --cargo-pkgs
#
# Active entries are sorted by crate/url key (LC_ALL=C sort); disabled
# candidates are kept commented-out at the bottom. Optional `bin:`/`feature:`
# refine the command (desc is documentation only — run.sh does not read it):
#   - crate: <name>                  -> cargo binstall <name>
#   - crate: <name> + feature: <f>   -> cargo binstall <name> --features <f>
#   - url: <git-url>                 -> cargo install --git <url>
#   - url: <git-url> + bin: <pkg>    -> cargo install --git <url> <pkg>
#   - url: <git-url> + feature: <f>  -> cargo install --git <url> --features <f>
packages:
  - crate: bacon
    desc: background code checker
  - crate: bat
    desc: A cat(1) clone with wings.
  - crate: bottom
    desc: Yet another cross-platform graphical process/system monitor.
  - crate: cargo-binstall
    desc: Binary installation for rust projects
  - crate: cargo-deny
    desc: Cargo plugin for linting your dependencies
  - crate: cargo-fuzz
    desc: Command line helpers for fuzzing
  - crate: cargo-license
    desc: Cargo subcommand to see license of dependencies
  - crate: cargo-nextest
    desc: A next-generation test runner for Rust.
  - crate: cargo-tarpaulin
    desc: A code coverage tool for Rust projects
  - crate: cargo-update
    desc: A cargo subcommand for checking and applying updates to installed executables
  - crate: cfonts
    desc: Sexy fonts for the console
  - crate: choose
    desc: A human-friendly and fast alternative to cut and (sometimes) awk
  - crate: code2prompt
    desc: A CLI tool to convert your codebase into a single LLM prompt with source tree, prompt templating, and token counting.
  - crate: csview
    desc: Pretty and fast csv viewer for cli with cjk/emoji support.
  - crate: du-dust
    desc: A more intuitive version of du in rust
  - crate: evcxr_jupyter
    desc: A Jupyter Kernel
  - crate: evcxr_repl
