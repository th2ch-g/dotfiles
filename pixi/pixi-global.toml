[envs.tor]
channels = ["conda-forge"]
dependencies = { tor = "*" }
exposed = { tor = "tor" }

[envs.typst]
channels = ["conda-forge"]
dependencies = { typst = "*" }
exposed = { typst = "typst" }

[envs.vhs]
channels = ["conda-forge"]
dependencies = { vhs = "*" }
exposed = { vhs = "vhs" }

[envs.wget]
channels = ["conda-forge"]
